<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;">
  <tr>
    <td align="center" style="padding:32px 16px;">

      <!-- card -->
      <table role="presentation" width="100%" style="max-width:560px;background:#ffffff;border-radius:8px;overflow:hidden;">

        <!-- header -->
        <tr>
          <td style="background:#111111;padding:20px 32px;">
            <span style="color:#ffffff;font-size:18px;font-weight:700;letter-spacing:-0.3px;">매일함</span>
            <span style="color:#888888;font-size:13px;margin-left:10px;">{{.RepoName}}</span>
          </td>
        </tr>

        <!-- body -->
        <tr>
          <td style="padding:32px 32px 24px;">
            <p style="margin:0 0 8px;font-size:12px;font-weight:600;color:#888888;text-transform:uppercase;letter-spacing:0.5px;">오늘의 질문</p>
            <h1 style="margin:0 0 16px;font-size:20px;font-weight:700;color:#111111;line-height:1.4;">{{.Title}}</h1>
            {{if .Preview}}
            <p style="margin:0;font-size:15px;color:#444444;line-height:1.7;">{{.Preview}}</p>
            {{end}}
          </td>
        </tr>

        <!-- divider -->
        <tr>
          <td style="padding:0 32px;">
            <hr style="border:none;border-top:1px solid #eeeeee;margin:0;">
          </td>
        </tr>

        <!-- cta -->
        <tr>
          <td style="padding:24px 32px;">
            <table role="presentation" cellpadding="0" cellspacing="0">
              <tr>
                <td style="padding-right:12px;">
                  <a href="{{.GitHubURL}}" style="display:inline-block;background:#111111;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;padding:10px 20px;border-radius:6px;">전체 보기 →</a>
                </td>
                {{if .DiscussionURL}}
                <td>
                  <a href="{{.DiscussionURL}}" style="display:inline-block;background:#ffffff;color:#111111;font-size:14px;font-weight:600;text-decoration:none;padding:10px 20px;border-radius:6px;border:1px solid #dddddd;">토론 참여 →</a>
                </td>
                {{end}}
              </tr>
            </table>
          </td>
        </tr>

        <!-- footer -->
        <tr>
          <td style="background:#f9f9f9;padding:16px 32px;border-top:1px solid #eeeeee;">
            <p style="margin:0;font-size:12px;color:#aaaaaa;line-height:1.6;">
              매일함은 하루 한 통, 개발 학습 질문을 드립니다.
              {{if .UnsubscribeURL}}
              &nbsp;·&nbsp;<a href="{{.UnsubscribeURL}}" style="color:#aaaaaa;">구독 해지</a>
              {{end}}
            </p>
          </td>
        </tr>

      </table>
      <!-- /card -->

    </td>
  </tr>
</table>
</body>
</html>
